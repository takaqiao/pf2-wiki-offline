<script>
/* If the user landed here from a link, try to pre-fill the search box with a
   plausible search term derived from the URL that triggered the 404. Two
   sources we can use, in priority order:
     (a) document.referrer's pathname (often the missing target itself when
         tiny_http serves 404.html in fallback mode), but referrer is rarely
         set for in-app loads, so this is best-effort.
     (b) The current URL's pathname after the wiki root, in case a stub page
         redirected here via meta-refresh fall-through.                       */
(function () {
  "use strict";
  function stripHtml(name) {
    if (!name) return "";
    return decodeURIComponent(name).replace(/\.html$/i, "").replace(/^[\/\\]+/, "");
  }
  function deriveQuery() {
    try {
      var sp = new URLSearchParams(location.search);
      var q = sp.get("q") || sp.get("missing");
      if (q) return q;
    } catch (e) {}
    try {
      var path = location.pathname;
      var m = path.match(/\/(?:pages|category|data)\/([^?#]+\.html)$/i);
      if (m) return stripHtml(m[1]);
      if (path && path !== "/404.html" && path !== "/" && /\.html$/i.test(path)) {
        var tail = path.split("/").pop();
        if (tail && tail !== "404.html") return stripHtml(tail);
      }
    } catch (e) {}
    return "";
  }
  var q = deriveQuery();
  if (q) {
    var input = document.querySelector(".nf-search-input");
    if (input) input.value = q;
    var w = document.getElementById("nf-attempted-wrap");
    var s = document.getElementById("nf-attempted");
    if (w && s) {
      s.textContent = location.pathname || q;
      w.style.display = "";
    }
  }
})();
</script>
