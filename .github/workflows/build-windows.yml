# Lightweight CI: verify the Tauri app still COMPILES (incl. ACL capability /
# permission validation) on every push. We do NOT build installers here —
# distribution is portable ZIP + chained patches, produced locally by
# src-tauri/release.ps1 (the 1.8 GB wiki corpus isn't in git, and Cloudflare
# blocks scraping from headless CI). This job just catches Rust/Tauri breakage
# early and archives the compiled exe as a backup artifact.
name: CI - compile check

on:
  push:
    branches: [main, master]
    paths:
      - 'src-tauri/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: dtolnay/rust-toolchain@stable

      - name: Placeholder frontend (corpus not in git)
        run: |
          New-Item -ItemType Directory _wiki_full_v2 -Force | Out-Null
          if (-not (Test-Path _wiki_full_v2/index.html)) {
            "<html><body>CI placeholder</body></html>" | Out-File _wiki_full_v2/index.html -Encoding utf8
          }
        shell: pwsh

      - name: Compile (release, no bundle) — validates ACL capability + permissions
        working-directory: src-tauri
        run: cargo build --release
        shell: pwsh
        env:
          RUST_BACKTRACE: 1

      - name: Archive compiled exe (backup)
        uses: actions/upload-artifact@v4
        with:
          name: pf2-wiki-exe
          path: src-tauri/target/release/pf2-wiki.exe
          if-no-files-found: warn
          retention-days: 14
