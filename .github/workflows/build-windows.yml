# Build Tauri Windows NSIS installer on push / tag / manual dispatch.
# Caches cargo deps so subsequent builds are ~5 min vs ~15 min cold.
name: Build Tauri Windows NSIS

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Attach to release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # for release upload

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked
        shell: pwsh

      - name: Download v2 wiki corpus
        # CI doesn't have the 1.84 GB scraped corpus. Download from latest Release.
        # If unavailable (first run), skip NSIS bundle and only build exe.
        run: |
          $ErrorActionPreference = 'Continue'
          gh release download --pattern wiki-data.zip --dir . 2>$null
          if (Test-Path wiki-data.zip) {
            Write-Host "Got wiki-data.zip, extracting..."
            New-Item -ItemType Directory _wiki_full_v2 -Force | Out-Null
            7z x wiki-data.zip -o_wiki_full_v2
            Remove-Item wiki-data.zip
          } else {
            Write-Host "No wiki-data.zip available, building only exe (no NSIS bundle)"
            New-Item -ItemType Directory _wiki_full_v2 -Force | Out-Null
            "<html><body>Placeholder</body></html>" | Out-File _wiki_full_v2/index.html -Encoding utf8
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri (release; signing for updater if v2 corpus present)
        working-directory: src-tauri
        run: |
          if (Test-Path ../_wiki_full_v2/index.html) {
            # Have wiki corpus -> full build with NSIS bundle + signing
            cargo tauri build
          } else {
            # No corpus -> just compile exe, skip bundle
            cargo tauri build --no-bundle
          }
        shell: pwsh
        env:
          RUST_BACKTRACE: 1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater latest.json (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: src-tauri/target/release/bundle/nsis
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $exe = Get-ChildItem -Filter '*setup.exe' | Select-Object -First 1
          $sig = Get-ChildItem -Filter '*setup.exe.sig' | Select-Object -First 1
          if (-not $exe -or -not $sig) {
            Write-Error "missing setup.exe or .sig"
            exit 1
          }
          $sigContent = (Get-Content $sig.FullName -Raw).Trim()
          $manifest = @{
            version = $version
            notes = "PF2 离线百科 $tag"
            pub_date = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
            platforms = @{
              'windows-x86_64' = @{
                signature = $sigContent
                url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($exe.Name)"
              }
            }
          }
          $json = $manifest | ConvertTo-Json -Depth 5
          $json | Out-File -FilePath 'latest.json' -Encoding utf8
          Write-Host "Generated latest.json:"
          Write-Host $json
        shell: pwsh

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pf2-wiki-exe
          path: src-tauri/target/release/pf2-wiki.exe
          if-no-files-found: warn

      - name: Upload NSIS installer (if built)
        uses: actions/upload-artifact@v4
        with:
          name: pf2-wiki-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*setup.exe
          if-no-files-found: warn

      - name: Attach to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*setup.exe
            src-tauri/target/release/bundle/nsis/*setup.exe.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/pf2-wiki.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
