# Build Tauri Windows NSIS installer on push / tag / manual dispatch.
# Caches cargo deps so subsequent builds are ~5 min vs ~15 min cold.
name: Build Tauri Windows NSIS

on:
  push:
    branches: [main, master]
    paths:
      - 'src-tauri/**'
      - '_wiki_full_v2/assets/**'
      - '_wiki_full_v2/_snippets/**'
      - '_tauri_placeholder/**'
      - '.github/workflows/build-windows.yml'
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Attach to release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # for release upload

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked
        shell: pwsh

      - name: Download v2 wiki corpus
        # CI doesn't have the 1.84 GB scraped corpus. Download from latest Release.
        # If unavailable (first run), skip NSIS bundle and only build exe.
        run: |
          $ErrorActionPreference = 'Continue'
          gh release download --pattern wiki-data.zip --dir . 2>$null
          if (Test-Path wiki-data.zip) {
            Write-Host "Got wiki-data.zip, extracting..."
            New-Item -ItemType Directory _wiki_full_v2 -Force | Out-Null
            7z x wiki-data.zip -o_wiki_full_v2
            Remove-Item wiki-data.zip
          } else {
            Write-Host "No wiki-data.zip available, will skip NSIS bundle"
            New-Item -ItemType Directory _wiki_full_v2 -Force | Out-Null
            "<html><body>Placeholder</body></html>" | Out-File _wiki_full_v2/index.html
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri (release)
        working-directory: src-tauri
        run: cargo tauri build
        shell: pwsh
        env:
          # In CI, RUST_BACKTRACE helps debug failures
          RUST_BACKTRACE: 1

      - name: Upload installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pf2-wiki-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*setup.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release)
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
